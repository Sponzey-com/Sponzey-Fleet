<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sponzey Fleet API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #ffffff;
      }

      .sponzey-api-warning {
        box-sizing: border-box;
        padding: 12px 18px;
        border-bottom: 1px solid #d8dee4;
        background: #fff8c5;
        color: #3f2e00;
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="sponzey-api-warning">
      HTTP is test-only. Use HTTPS for product, production, shared, or long-running environments because tokens and request payloads are not encrypted over HTTP.
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.addEventListener("load", () => {
        window.ui = SwaggerUIBundle({
          url: "/openapi.json",
          dom_id: "#swagger-ui",
          deepLinking: true,
          persistAuthorization: false,
          displayRequestDuration: true,
          defaultModelsExpandDepth: 1,
        });
      });
    </script>
  </body>
</html>
